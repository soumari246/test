<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ブロック崩し</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0804;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    user-select: none;
    padding: 20px 8px;
    overflow-x: hidden;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 12px;
    letter-spacing: 4px;
    color: #ff8c42;
    text-shadow: 0 0 20px #ff8c4288;
  }
  #info {
    display: flex;
    gap: 40px;
    margin-bottom: 12px;
    font-size: 1rem;
    color: #aa8866;
  }
  #info span { color: #fff; font-weight: bold; }

  /* ── ゲームエリア ── */
  #game-wrap {
    position: relative;
  }
  canvas {
    border: 2px solid #ff8c4244;
    border-radius: 8px;
    box-shadow: 0 0 40px #ff8c4222;
    display: block;
    touch-action: none; /* スクロール防止 */
  }

  /* ── 名前入力モーダル ── */
  #name-modal {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(13, 8, 4, 0.92);
    border-radius: 8px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
  }
  #name-modal.show { display: flex; }
  #name-modal .modal-title {
    font-size: 2rem;
    font-weight: bold;
    color: #fff;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #ff8c42;
  }
  #name-modal .modal-score {
    font-size: 1.2rem;
    color: #ffcc44;
  }
  #name-modal .modal-score span { font-weight: bold; font-size: 1.5rem; }
  #name-modal p {
    font-size: 0.9rem;
    color: #aa8866;
  }
  #name-input {
    background: #1e1008;
    border: 2px solid #ff8c4266;
    border-radius: 6px;
    color: #fff;
    font-size: 1.1rem;
    padding: 8px 14px;
    width: 240px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  #name-input:focus { border-color: #ff8c42; }
  #name-input::placeholder { color: #554433; }
  .modal-buttons { display: flex; gap: 12px; }
  .modal-btn {
    padding: 8px 22px;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-btn:hover { opacity: 0.85; }
  #submit-btn { background: #ff7a2a; color: #fff; font-weight: bold; }
  #skip-btn   { background: #332211; color: #aa8866; }

  /* ── メッセージ ── */
  #msg {
    margin-top: 16px;
    font-size: 1.1rem;
    color: #ffcc44;
    height: 24px;
    text-shadow: 0 0 10px #ffcc4488;
  }
  #controls {
    margin-top: 6px;
    font-size: 0.8rem;
    color: #554433;
  }

  /* ── ランキングパネル ── */
  #ranking {
    margin-top: 20px;
    width: 100%;
    max-width: 640px;
    background: #120a06;
    border: 1px solid #ff8c4233;
    border-radius: 8px;
    padding: 14px 20px;
  }
  #ranking .rank-title {
    font-size: 1rem;
    letter-spacing: 4px;
    color: #ff8c42;
    text-align: center;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #ff8c4288;
  }
  #rank-list {
    font-size: 0.9rem;
    color: #aa8866;
  }
  .rank-row {
    display: flex;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid #ffffff0a;
    gap: 10px;
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-num {
    width: 28px;
    text-align: right;
    font-weight: bold;
    color: #554433;
  }
  .rank-num.top1 { color: #ffd700; }
  .rank-num.top2 { color: #c0c0c0; }
  .rank-num.top3 { color: #cd7f32; }
  .rank-name { flex: 1; color: #fff; }
  .rank-name.me { color: #ffcc44; }
  .rank-score { font-weight: bold; color: #ff8c42; width: 70px; text-align: right; }
  .rank-level { color: #554433; font-size: 0.8rem; width: 50px; text-align: right; }
  .rank-empty { text-align: center; color: #443322; padding: 10px 0; }
  .rank-error { text-align: center; color: #ff4422; padding: 10px 0; font-size: 0.85rem; }

  /* ── スマホ対応 ── */
  @media (max-width: 660px) {
    body { padding: 10px 8px; }
    h1 { font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 8px; }
    #info { gap: 14px; font-size: 0.82rem; margin-bottom: 8px; }
    #msg { font-size: 0.9rem; margin-top: 10px; }
    #controls { font-size: 0.72rem; }
    #ranking { padding: 10px 12px; }
    #name-input { width: 90%; }
    .modal-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<h1>BLOCK BREAKER</h1>
<div id="info">
  スコア: <span id="scoreVal">0</span>
  &nbsp;&nbsp;ライフ: <span id="livesVal">❤❤❤</span>
  &nbsp;&nbsp;レベル: <span id="levelVal">1</span>
</div>

<div id="game-wrap">
  <canvas id="c" width="640" height="600"></canvas>

  <!-- 名前入力モーダル -->
  <div id="name-modal">
    <div class="modal-title">GAME OVER</div>
    <div class="modal-score">スコア: <span id="final-score">0</span></div>
    <p>名前を入力してランキングに登録</p>
    <input id="name-input" type="text" maxlength="12" placeholder="プレイヤー名 (最大12文字)">
    <div class="modal-buttons">
      <button class="modal-btn" id="submit-btn">登録する</button>
      <button class="modal-btn" id="skip-btn">スキップ</button>
    </div>
  </div>
</div>

<div id="msg">タップ / スペースキーでスタート</div>
<div id="controls">スワイプ / ← → キー / マウスでパドルを操作</div>

<!-- ランキングパネル -->
<div id="ranking">
  <div class="rank-title">R A N K I N G</div>
  <div id="rank-list"><div class="rank-empty">読み込み中...</div></div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════
const SUPABASE_URL      = 'https://yulepyoxulkjdvtnvrse.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bGVweW94dWxramR2dG52cnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDIzNDUsImV4cCI6MjA4ODQ3ODM0NX0.csayXhG1l7IOtBinNh1ymQeywAZKuyQaMIG4HAR9gnQ';

const db = (SUPABASE_URL !== 'YOUR_SUPABASE_URL')
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;  // 未設定時はオフラインモード

// ══════════════════════════════════════════════════════
//  ランキング取得
// ══════════════════════════════════════════════════════
async function fetchRanking() {
  const list = document.getElementById('rank-list');
  if (!db) {
    list.innerHTML = '<div class="rank-empty">※ Supabase 未設定（オフラインモード）</div>';
    return;
  }
  const { data, error } = await db
    .from('scores')
    .select('name, score, level')
    .order('score', { ascending: false })
    .limit(10);

  if (error) {
    list.innerHTML = '<div class="rank-error">ランキングの取得に失敗しました</div>';
    return;
  }
  if (!data || data.length === 0) {
    list.innerHTML = '<div class="rank-empty">まだ記録がありません</div>';
    return;
  }
  list.innerHTML = data.map((row, i) => {
    const numClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
    const isMe = row.name === lastSubmittedName;
    return `
      <div class="rank-row">
        <div class="rank-num ${numClass}">${medal}</div>
        <div class="rank-name ${isMe ? 'me' : ''}">${escapeHtml(row.name)}${isMe ? ' ★' : ''}</div>
        <div class="rank-score">${row.score.toLocaleString()}</div>
        <div class="rank-level">Lv.${row.level}</div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
//  スコア送信
// ══════════════════════════════════════════════════════
let lastSubmittedName = '';

async function submitScore(name) {
  if (!db) return;
  lastSubmittedName = name;
  const { error } = await db.from('scores').insert({ name, score, level });
  if (error) console.error('スコア送信エラー:', error.message);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════════
//  名前入力モーダル
// ══════════════════════════════════════════════════════
const nameModal  = document.getElementById('name-modal');
const nameInput  = document.getElementById('name-input');
const submitBtn  = document.getElementById('submit-btn');
const skipBtn    = document.getElementById('skip-btn');
const finalScore = document.getElementById('final-score');

function showNameInput() {
  finalScore.textContent = score.toLocaleString();
  nameInput.value = '';
  nameModal.classList.add('show');
  nameInput.focus();
}

function hideNameInput() {
  nameModal.classList.remove('show');
}

async function onSubmit() {
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  submitBtn.disabled = true;
  submitBtn.textContent = '送信中...';
  await submitScore(name);
  submitBtn.disabled = false;
  submitBtn.textContent = '登録する';
  hideNameInput();
  state = 'gameover';
  await fetchRanking();
}

async function onSkip() {
  lastSubmittedName = '';
  hideNameInput();
  state = 'gameover';
  await fetchRanking();
}

submitBtn.addEventListener('click', onSubmit);
skipBtn.addEventListener('click', onSkip);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') onSubmit(); });

// ══════════════════════════════════════════════════════
//  ゲーム本体
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── 定数 ───────────────────────────────────────────
const PADDLE_H = 12, PADDLE_W = 110;
const BALL_R = 8;
const ROWS = 8, COLS = 20;
const BRICK_W = 26, BRICK_H = 26;
const BRICK_PAD = 4;
const BRICK_TOP = 55;
// HP別カラー: HP1(明)→HP4(暗)
const HP_COLORS = ['#ffcc44', '#ff8c2a', '#ff4422', '#991100'];

// ─── 状態 ───────────────────────────────────────────
let score, lives, level, state;
// state: 'idle'|'playing'|'dead'|'clear'|'nameinput'|'gameover'
let paddle, balls, bricks, particles;
let mouseX = W / 2;
let keys = {};
let scale = 1; // 画面スケール係数

// ─── レスポンシブ: Canvasをウィンドウ幅に合わせてスケール ───
function resizeCanvas() {
  const padding = 16; // 左右余白合計
  const available = Math.min(window.innerWidth - padding, W);
  scale = available / W;
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  // ランキングパネルをCanvas幅に合わせる
  document.getElementById('ranking').style.maxWidth = (W * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);

function createBall(x, y, vx, vy) {
  return { x, y, vx, vy, r: BALL_R };
}

function init(newLevel = 1) {
  level = newLevel;
  if (newLevel === 1) { score = 0; lives = 3; }
  paddle = { x: W / 2 - PADDLE_W / 2, y: H - 40, w: PADDLE_W, h: PADDLE_H };
  const speed = 2.0 + (level - 1) * 0.2;
  balls = [createBall(W / 2, H - 60, speed * (Math.random() > 0.5 ? 1 : -1), -speed)];
  bricks = [];
  const rows = Math.min(ROWS + Math.floor((level - 1) / 2), 14);
  const offsetX = Math.floor((W - (COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2);
  // レベルに応じた多段ブロックの出現率 (HP1〜4)
  const p4 = Math.min(0.04 + (level - 1) * 0.02, 0.18);
  const p3 = Math.min(0.12 + (level - 1) * 0.02, 0.25);
  const p2 = Math.min(0.25 + (level - 1) * 0.03, 0.38);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < COLS; c++) {
      // 虹色ブロック (0.8%)
      if (Math.random() < 0.008) {
        bricks.push({
          x: c * (BRICK_W + BRICK_PAD) + offsetX,
          y: r * (BRICK_H + BRICK_PAD) + BRICK_TOP,
          w: BRICK_W, h: BRICK_H,
          hp: 1, maxHp: 1, color: '#fff', type: 'rainbow', alive: true
        });
      } else {
        const rand = Math.random();
        const hp = rand < p4 ? 4 : rand < p4 + p3 ? 3 : rand < p4 + p3 + p2 ? 2 : 1;
        bricks.push({
          x: c * (BRICK_W + BRICK_PAD) + offsetX,
          y: r * (BRICK_H + BRICK_PAD) + BRICK_TOP,
          w: BRICK_W, h: BRICK_H,
          hp, maxHp: hp, color: HP_COLORS[hp - 1], alive: true
        });
      }
    }
  }
  // 虹ブロックが1つもない場合、ランダムな位置に強制配置
  if (!bricks.some(b => b.type === 'rainbow')) {
    const idx = Math.floor(Math.random() * bricks.length);
    const b = bricks[idx];
    b.hp = 1; b.maxHp = 1; b.color = '#fff'; b.type = 'rainbow';
  }
  particles = [];
  state = 'idle';
  updateHUD();
}

// ─── パーティクル ────────────────────────────────────
function spawnParticles(x, y, color, n = 12) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: 0.03 + Math.random() * 0.04,
      size: 2 + Math.random() * 4,
      color
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── 描画 ───────────────────────────────────────────
function drawBG() {
  ctx.fillStyle = '#0d0804';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#ffffff06';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawPaddle() {
  const g = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  g.addColorStop(0, '#ff9b2a');
  g.addColorStop(1, '#cc4400');
  ctx.fillStyle = g;
  ctx.shadowColor = '#ff7a2a';
  ctx.shadowBlur = 15;
  roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBalls() {
  for (const ball of balls) {
    const g = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(1, '#ff9b2a');
    ctx.fillStyle = g;
    ctx.shadowColor = '#ff7a2a';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawBricks() {
  const t = Date.now() / 400;
  for (const b of bricks) {
    if (!b.alive) continue;
    if (b.type === 'rainbow') { drawRainbowBrick(b, t); continue; }
    const alpha = 0.4 + 0.6 * (b.hp / b.maxHp);
    ctx.globalAlpha = alpha;
    const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    g.addColorStop(0, b.color);
    g.addColorStop(1, b.color + '88');
    ctx.fillStyle = g;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    roundRect(b.x, b.y, b.w, b.h, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    if (b.maxHp > 1) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.hp, b.x + b.w / 2, b.y + b.h / 2);
    }
  }
  ctx.globalAlpha = 1;
}

function drawRainbowBrick(b, t) {
  const hue = (t * 360) % 360;
  const g = ctx.createLinearGradient(b.x, b.y, b.x + b.w, b.y + b.h);
  g.addColorStop(0,    `hsl(${hue % 360}, 100%, 65%)`);
  g.addColorStop(0.33, `hsl(${(hue + 120) % 360}, 100%, 65%)`);
  g.addColorStop(0.66, `hsl(${(hue + 240) % 360}, 100%, 65%)`);
  g.addColorStop(1,    `hsl(${hue % 360}, 100%, 65%)`);
  ctx.globalAlpha = 1;
  ctx.fillStyle = g;
  ctx.shadowColor = `hsl(${hue % 360}, 100%, 70%)`;
  ctx.shadowBlur = 14;
  roundRect(b.x, b.y, b.w, b.h, 4);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('★', b.x + b.w / 2, b.y + b.h / 2);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawOverlay(text, sub) {
  ctx.fillStyle = '#00000088';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px sans-serif';
  ctx.shadowColor = '#ff7a2a';
  ctx.shadowBlur = 20;
  ctx.fillText(text, W / 2, H / 2 - 20);
  ctx.shadowBlur = 0;
  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#aa8866';
  ctx.fillText(sub, W / 2, H / 2 + 20);
}

// ─── 物理 ───────────────────────────────────────────
function movePaddle() {
  paddle.x = mouseX - paddle.w / 2;
  const spd = 7;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) paddle.x -= spd;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) paddle.x += spd;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
}

function moveAllBalls() {
  for (let bi = balls.length - 1; bi >= 0; bi--) {
    const ball = balls[bi];
    ball.x += ball.vx;
    ball.y += ball.vy;

    // 壁
    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
    if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

    // パドル衝突
    if (
      ball.vy > 0 &&
      ball.x > paddle.x && ball.x < paddle.x + paddle.w &&
      ball.y + ball.r > paddle.y && ball.y + ball.r < paddle.y + paddle.h + 8
    ) {
      ball.y = paddle.y - ball.r;
      const rel = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      const angle = rel * 60 * Math.PI / 180;
      const spd = Math.hypot(ball.vx, ball.vy);
      ball.vx = spd * Math.sin(angle);
      ball.vy = -Math.abs(spd * Math.cos(angle));
      spawnParticles(ball.x, ball.y, '#ff9b2a', 6);
    }

    // 落下
    if (ball.y - ball.r > H) {
      balls.splice(bi, 1);
      if (balls.length === 0) {
        lives--;
        updateHUD();
        if (lives <= 0) {
          state = 'nameinput';
          showNameInput();
          return;
        }
        const spd = 2.0 + (level - 1) * 0.2;
        balls = [createBall(W / 2, H - 60, spd * (Math.random() > 0.5 ? 1 : -1), -spd)];
        state = 'dead';
      }
      continue;
    }

    // ブロック衝突
    for (const b of bricks) {
      if (!b.alive) continue;
      const dx = Math.max(b.x - ball.x, 0, ball.x - (b.x + b.w));
      const dy = Math.max(b.y - ball.y, 0, ball.y - (b.y + b.h));
      if (dx * dx + dy * dy < ball.r * ball.r) {
        b.hp--;
        spawnParticles(ball.x, ball.y, b.color, 8);
        if (b.hp <= 0) {
          b.alive = false;
          score += b.maxHp * 10 * level;
          spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 20);
          // 虹色ブロック: 周囲に1ダメージ
          if (b.type === 'rainbow') damageNeighbors(b);
          // HP3: +1球 / HP4: +2球（真下へ）
          const bSpd = Math.hypot(ball.vx, ball.vy);
          if (b.maxHp === 3) {
            balls.push(createBall(b.x + b.w / 2, b.y + b.h / 2, (Math.random() - 0.5) * bSpd * 0.3, bSpd));
          } else if (b.maxHp === 4) {
            balls.push(createBall(b.x + b.w / 2, b.y + b.h / 2, -bSpd * 0.3, bSpd));
            balls.push(createBall(b.x + b.w / 2, b.y + b.h / 2,  bSpd * 0.3, bSpd));
          }
          updateHUD();
        }
        const overlapX = (ball.x < b.x || ball.x > b.x + b.w);
        const overlapY = (ball.y < b.y || ball.y > b.y + b.h);
        if (overlapX && !overlapY) ball.vx *= -1;
        else if (!overlapX && overlapY) ball.vy *= -1;
        else { ball.vx *= -1; ball.vy *= -1; }
        break;
      }
    }
  }

  if (bricks.every(b => !b.alive)) {
    state = 'clear';
  }
}

function damageNeighbors(b) {
  // 縦・横一列（十字）に2ダメージを与える
  const bcx = b.x + b.w / 2, bcy = b.y + b.h / 2;
  const thresh = 2; // 同行・同列の判定誤差許容値

  // ビームエフェクト: 虹色パーティクルを横列・縦列に放出
  const hue = (Date.now() / 4) % 360;
  for (let x = 0; x <= W; x += 18) {
    spawnParticles(x, bcy, `hsl(${(hue + x * 0.5) % 360}, 100%, 70%)`, 1);
  }
  for (let y = BRICK_TOP; y < H - 60; y += 18) {
    spawnParticles(bcx, y, `hsl(${(hue + y * 0.5) % 360}, 100%, 70%)`, 1);
  }

  for (const nb of bricks) {
    if (!nb.alive || nb === b) continue;
    const ncx = nb.x + nb.w / 2;
    const ncy = nb.y + nb.h / 2;
    const sameRow = Math.abs(ncy - bcy) < thresh; // 同じ横列
    const sameCol = Math.abs(ncx - bcx) < thresh; // 同じ縦列
    if (sameRow || sameCol) {
      nb.hp -= 2; // 2ダメージ
      spawnParticles(ncx, ncy, '#ffffff', 12);
      if (nb.hp <= 0) {
        nb.alive = false;
        score += nb.maxHp * 10 * level;
        spawnParticles(ncx, ncy, nb.color, 20);
        if (nb.type === 'rainbow') damageNeighbors(nb); // 連鎖
        updateHUD();
      }
    }
  }
}

// ─── HUD ────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreVal').textContent = score.toLocaleString();
  document.getElementById('livesVal').textContent = '❤'.repeat(Math.max(0, lives));
  document.getElementById('levelVal').textContent = level;
  document.getElementById('msg').textContent = '';
}

// ─── メインループ ────────────────────────────────────
function loop() {
  drawBG();
  drawBricks();
  drawParticles();
  drawPaddle();

  if (state === 'playing') {
    movePaddle();
    moveAllBalls();
    updateParticles();
    drawBalls();
  } else if (state === 'idle') {
    movePaddle();
    updateParticles();
    drawBalls();
    drawOverlay('READY?', 'タップ / スペースキーでスタート');
  } else if (state === 'dead') {
    movePaddle();
    updateParticles();
    drawBalls();
    drawOverlay(`残りライフ: ${'❤'.repeat(lives)}`, 'タップ / スペースキーで続ける');
  } else if (state === 'clear') {
    updateParticles();
    drawBalls();
    spawnParticles(Math.random() * W, Math.random() * H, HP_COLORS[Math.floor(Math.random() * HP_COLORS.length)], 3);
    drawOverlay(`LEVEL ${level} CLEAR! 🎉`, 'タップ / スペースキーで次のレベルへ');
  } else if (state === 'nameinput') {
    updateParticles();
    // モーダルが前面に出るのでCanvasは薄暗くするだけ
    ctx.fillStyle = '#00000066';
    ctx.fillRect(0, 0, W, H);
  } else if (state === 'gameover') {
    updateParticles();
    drawOverlay('GAME OVER', 'タップ / スペースキーでリスタート');
  }

  requestAnimationFrame(loop);
}

// ─── 入力 ───────────────────────────────────────────
function advance() {
  if (state === 'nameinput') return; // モーダル中は無視
  if (state === 'idle' || state === 'dead') { state = 'playing'; }
  else if (state === 'clear') { init(level + 1); state = 'playing'; }
  else if (state === 'gameover') { init(1); state = 'playing'; }
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); advance(); }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / scale; // scaleで割って内部座標に変換
});

canvas.addEventListener('click', () => advance());

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) / scale;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) / scale;
  advance();
}, { passive: false });

// ─── 起動 ───────────────────────────────────────────
resizeCanvas(); // 初回スケール適用
init(1);
fetchRanking();
loop();
</script>
</body>
